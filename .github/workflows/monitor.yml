name: Monitor de Mapa

on:
  schedule:
    - cron: "*/5 * * * *"   # a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  verificar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests schedule google-auth google-auth-oauthlib google-api-python-client

      - name: Escrever credenciais do Google
        run: |
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
          echo '${{ secrets.GOOGLE_TOKEN }}'       > token.json

      - name: Validar credenciais
        run: |
          python -c "import json, sys; json.load(open('credentials.json'))" \
            || { echo "ERRO: GOOGLE_CREDENTIALS inválido ou não configurado nos Secrets!"; exit 1; }
          python -c "import json, sys; json.load(open('token.json'))" \
            || { echo "ERRO: GOOGLE_TOKEN inválido ou não configurado nos Secrets!"; exit 1; }
          echo "Credenciais OK."

      - name: Executar verificação
        run: python monitor_mapa.py --once

      - name: Salvar snapshot atualizado no repositório
        run: |
          git config user.name  "Monitor Bot"
          git config user.email "monitor-bot@github.com"
          git add snapshot_anterior.json
          git diff --staged --quiet || git commit -m "chore: atualiza snapshot do mapa [skip ci]"
          git push
